name: Deploy to Production

# Runs automatically when you push to the 'main' branch (via PR from staging),
# or manually via the Actions UI ("Run workflow" button).
# Note: the 'production' environment requires manual approval in repo settings.
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/**'
      - 'prompts/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in repo settings.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      # Lint every PHP file in the repo. xargs -r (no-run-if-empty)
      # makes this pass cleanly when the repo has zero PHP files.
      - name: Check PHP syntax
        run: find . -path './.git' -prune -o -name '*.php' -print0 | xargs -0 -r -n1 php -l

      - name: Deploy to Production via FTP
        if: ${{ secrets.PROD_FTP_SERVER != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.PROD_FTP_SERVER }}
          username: ${{ secrets.PROD_FTP_USERNAME }}
          password: ${{ secrets.PROD_FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.PROD_FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md
            CLAUDE.md
            .github/**
            prompts/**
            docs/**

      - name: FTP secrets check
        if: ${{ secrets.PROD_FTP_SERVER == '' }}
        run: echo "::warning::FTP secrets not configured. Skipping deploy step. Configure PROD_FTP_* in repo Settings > Secrets to enable real deployment (Phase 4 task)."

      - name: Production deployment complete
        if: ${{ secrets.PROD_FTP_SERVER != '' }}
        run: echo "🚀 Deployed to PRODUCTION successfully!"

      - name: Production deployment skipped
        if: ${{ secrets.PROD_FTP_SERVER == '' }}
        run: echo "ℹ️  Production deploy skipped (no FTP secrets). Syntax check passed."
